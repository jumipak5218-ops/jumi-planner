<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jumi Planner</title>

<style>
body{
 font-family: Arial;
 background:#fff8ef;
 padding:20px;
}
button{
 background:#e87555;
 color:white;
 border:none;
 padding:8px;
}
</style>

</head>

<body>

<h2>Today Duties</h2>

<input id="taskInput">
<button onclick="addTask()">Add</button>

<div id="taskList"></div>

<script>
let tasks=[];

function addTask(){
 let v=document.getElementById("taskInput").value;
 if(!v)return;
 tasks.push(v);
 render();
}

function render(){
 document.getElementById("taskList").innerHTML=
 tasks.map(t=>"<div>"+t+"</div>").join("");
}
</script>

</body>
</html>
