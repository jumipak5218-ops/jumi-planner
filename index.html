<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jumi Planner</title>
</head>

<body>

<h2>Today Duties</h2>

<input id="taskInput">
<button onclick="addTask()">Add</button>

<div id="taskList"></div>

<script>
let tasks=[];

function addTask(){
 let v=document.getElementById("taskInput").value;
 if(!v)return;
 tasks.push(v);
 render();
}

function render(){
 document.getElementById("taskList").innerHTML=
 tasks.map(t=>"<div>"+t+"</div>").join("");
}
</script>

</body>
</html>
